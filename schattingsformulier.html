<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schattingsformulier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root {
  --bg:#f4f2ee;--surface:#fff;--border:#d8d4cc;--border-strong:#b0aa9e;
  --text:#1a1916;--text-muted:#6b6760;--text-hint:#9e9a94;
  --accent:#1a4f8a;--accent-light:#e8f0f8;
  --green:#1a6b3c;--green-light:#e6f4ec;
  --orange:#c25a00;--orange-light:#fdf0e6;
  --red:#b01e1e;--red-light:#fbeaea;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh;}
.topbar{background:var(--text);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:.02em;}
.topbar-sub{font-size:12px;color:#aaa;font-family:'IBM Plex Mono',monospace;}
.topbar-right{display:flex;gap:8px;}
.icon-btn{background:rgba(255,255,255,.1);border:none;border-radius:var(--radius-sm);color:#fff;padding:7px 12px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;}
.icon-btn:active{background:rgba(255,255,255,.2);}
.screen{display:none;}.screen.active{display:block;}
.list-wrap{padding:20px;max-width:780px;margin:0 auto;}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.list-header h2{font-size:20px;font-weight:600;}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:12px 20px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-primary:active{opacity:.85;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-secondary:active{background:var(--bg);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #e8c0c0;border-radius:var(--radius);padding:11px 18px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-add{background:var(--accent-light);color:var(--accent);border:1.5px dashed var(--accent);border-radius:var(--radius);padding:12px 20px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;width:100%;margin-top:10px;}
.btn-add:active{opacity:.8;}
.dossier-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);cursor:pointer;}
.dossier-card:active{background:var(--bg);}
.dossier-addr{font-size:15px;font-weight:600;}
.dossier-meta{font-size:13px;color:var(--text-muted);margin-top:2px;}
.dossier-arrow{color:var(--text-hint);font-size:20px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-red{background:var(--red-light);color:var(--red);}
.form-wrap{padding:16px 20px 100px;max-width:780px;margin:0 auto;}
.progress-bar{display:flex;gap:4px;margin-bottom:20px;}
.prog-seg{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .2s;}
.prog-seg.done{background:var(--green);}
.prog-seg.active{background:var(--accent);}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:14px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
input[type=text],input[type=number],select,textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);appearance:none;-webkit-appearance:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
textarea{height:72px;resize:vertical;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.tile-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.tile-group input{display:none;}
.tile-group label{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .15s;user-select:none;}
.tile-group input:checked+label{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.toestand-group{display:flex;gap:6px;margin-top:4px;}
.ts{flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 6px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .15s;user-select:none;}
.ts:active{opacity:.8;}
.ts.sel-nieuw{border-color:var(--green);background:var(--green-light);color:var(--green);}
.ts.sel-zg{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.ts.sel-goed{border-color:var(--border-strong);background:#f0ede8;color:var(--text);}
.ts.sel-matig{border-color:var(--orange);background:var(--orange-light);color:var(--orange);}
.ts.sel-slecht{border-color:var(--red);background:var(--red-light);color:var(--red);}
.hidden-field{display:none;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;z-index:100;}
.bottom-nav button{flex:1;padding:14px;font-size:15px;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit;border:none;}
.btn-next{background:var(--accent);color:#fff;}
.btn-back{background:var(--bg);color:var(--text);border:1px solid var(--border)!important;}
.btn-next:active{opacity:.85;}
.btn-back:active{background:var(--border);}
.rapport-wrap{padding:16px 20px 100px;max-width:780px;margin:0 auto;}
.r-header{background:var(--text);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.r-header-addr{font-size:18px;font-weight:600;}
.r-header-meta{font-size:13px;color:#aaa;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.metric-box.accent{background:var(--accent);border-color:var(--accent);}
.metric-box.green{background:var(--green-light);border-color:#a8d8bc;}
.metric-box.red{background:var(--red-light);border-color:#e8c0c0;}
.metric-box.orange{background:var(--orange-light);border-color:#f0c898;}
.metric-lbl{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:3px;}
.metric-box.accent .metric-lbl{color:rgba(255,255,255,.7);}
.metric-val{font-size:22px;font-weight:600;color:var(--text);font-family:'IBM Plex Mono',monospace;}
.metric-box.accent .metric-val{color:#fff;}
.metric-box.green .metric-val{color:var(--green);}
.metric-box.red .metric-val{color:var(--red);}
.metric-box.orange .metric-val{color:var(--orange);}
.r-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.r-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px;}
.r-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--bg);font-size:14px;gap:12px;}
.r-row:last-child{border-bottom:none;}
.r-key{color:var(--text-muted);flex-shrink:0;}
.r-val{font-weight:500;text-align:right;color:var(--text);}
.flags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.flag{font-size:13px;font-weight:500;padding:5px 10px;border-radius:20px;}
.flag-ok{background:var(--green-light);color:var(--green);}
.flag-warn{background:var(--orange-light);color:var(--orange);}
.flag-bad{background:var(--red-light);color:var(--red);}
.verdict-box{border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.verdict-box.green{background:var(--green-light);border:1px solid #a8d8bc;}
.verdict-box.orange{background:var(--orange-light);border:1px solid #f0c898;}
.verdict-box.red{background:var(--red-light);border:1px solid #e8c0c0;}
.verdict-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.verdict-box.green .verdict-title{color:var(--green);}
.verdict-box.orange .verdict-title{color:var(--orange);}
.verdict-box.red .verdict-title{color:var(--red);}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.photo-thumb{position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);border:1.5px solid var(--border);}
.photo-thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.photo-thumb .del-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-label-input{width:100%;border:none;border-top:1px solid var(--border);padding:4px 6px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}
input[type=file].hidden-file{display:none;}
.ruimte-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.ruimte-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ruimte-title{font-size:14px;font-weight:600;color:var(--text);}
.ruimte-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 36px;width:100%;max-width:600px;}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px;}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.readonly-field{background:#f0ede8!important;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--accent)!important;}
@media print{
  .topbar,.bottom-nav,.no-print{display:none!important;}
  body{background:#fff;font-size:13px;}
  .screen{display:block!important;}
  #screen-list,#screen-form{display:none!important;}
  .rapport-wrap{padding:0;}
  .r-section,.metric-box,.r-header,.verdict-box{break-inside:avoid;}
  .photo-thumb .del-photo{display:none!important;}
  .photo-grid{grid-template-columns:repeat(3,1fr);gap:6px;}
}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">Schattingsformulier</div>
    <div class="topbar-sub" id="topbar-sub">Dossiers</div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn no-print" onclick="exportCSV()" id="btn-export" style="display:none">↓ CSV</button>
    <button class="icon-btn no-print" onclick="showDossiers()" id="btn-dossiers">☰ Dossiers</button>
  </div>
</div>

<div class="screen active" id="screen-list">
  <div class="list-wrap">
    <div class="list-header">
      <h2>Dossiers</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" onclick="exportCSV()">↓ CSV</button>
        <button class="btn-primary" onclick="nieuwDossier()">+ Nieuw</button>
      </div>
    </div>
    <div id="dossier-list"></div>
  </div>
</div>

<div class="screen" id="screen-form">
  <div class="form-wrap">
    <div class="progress-bar" id="progress-bar">
      <div class="prog-seg active" id="seg0"></div>
      <div class="prog-seg" id="seg1"></div>
      <div class="prog-seg" id="seg2"></div>
      <div class="prog-seg" id="seg3"></div>
      <div class="prog-seg" id="seg4"></div>
      <div class="prog-seg" id="seg5"></div>
      <div class="prog-seg" id="seg6"></div>
      <div class="prog-seg" id="seg7"></div>
    </div>
    <div id="form-content"></div>
  </div>
  <div class="bottom-nav no-print">
    <button class="btn-back" id="btn-back" onclick="stepBack()">← Terug</button>
    <button class="btn-next" id="btn-next" onclick="stepNext()">Volgende →</button>
  </div>
</div>

<div class="screen" id="screen-rapport">
  <div class="rapport-wrap" id="rapport-content"></div>
  <div class="bottom-nav no-print">
    <button class="btn-back" onclick="showDossiers()">← Dossiers</button>
    <button class="btn-next" onclick="window.print()">🖨 Afdrukken / PDF</button>
  </div>
</div>

<div class="modal-overlay" id="modal-dossier">
  <div class="modal-box">
    <div class="modal-title" id="modal-dossier-title">Dossier</div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="openDossierEdit()">✏️ Bewerken</button>
      <button class="btn-secondary" onclick="openDossierRapport()">📄 Rapport bekijken</button>
      <button class="btn-danger" onclick="deleteDossier()">🗑 Verwijderen</button>
      <button class="btn-secondary" onclick="closeModal()">Annuleren</button>
    </div>
  </div>
</div>

let formData = emptyData();

function getDossiers(){try{return JSON.parse(localStorage.getItem('schatt_dossiers')||'[]');}catch(e){return[];}}
function saveDossiers(arr){localStorage.setItem('schatt_dossiers',JSON.stringify(arr));}
function saveCurrentDossier(){
  formData.updated=new Date().toISOString();
  const arr=getDossiers();
  const idx=arr.findIndex(d=>d.id===formData.id);
  if(idx>=0)arr[idx]=formData;else arr.unshift(formData);
  saveDossiers(arr);
}

function generateSchattingnummer(){
  const now=new Date();
  const d=String(now.getDate()).padStart(2,'0');
  const m=String(now.getMonth()+1).padStart(2,'0');
  const y=now.getFullYear();
  const prefix=`${y}-${m}-${d}`;
  const arr=getDossiers();
  const vandaag=arr.filter(x=>x.schattingnummer&&x.schattingnummer.startsWith(prefix));
  return`${prefix}-${String(vandaag.length+1).padStart(3,'0')}`;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('btn-export').style.display=name==='list'?'flex':'none';
}

function showDossiers(){showScreen('list');document.getElementById('topbar-sub').textContent='Dossiers';renderDossierList();}

function nieuwDossier(){
  formData=emptyData();
  formData.schattingnummer=generateSchattingnummer();
  currentStep=0;showScreen('form');renderStep();
}

function openDossierById(id){
  const arr=getDossiers();const d=arr.find(x=>x.id===id);
  if(!d)return;
  formData=Object.assign(emptyData(),d);
  if(!formData.ruimtes)formData.ruimtes=[];
  if(!formData.terrassen)formData.terrassen=[];
  if(!formData.photos)formData.photos=[];
  currentStep=0;showScreen('form');renderStep();
}

function stepNext(){collectStep();saveCurrentDossier();if(currentStep<STEPS-1){currentStep++;renderStep();}else{showRapport();}}
function stepBack(){collectStep();if(currentStep>0){currentStep--;renderStep();}else showDossiers();}

function renderDossierList(){
  const arr=getDossiers();const el=document.getElementById('dossier-list');
  if(!arr.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🏠</div><p>Nog geen dossiers.<br>Tik op "+ Nieuw" om te starten.</p></div>';return;}
  el.innerHTML=arr.map(d=>{
    const verd=calcVerdict(d);
    const cls=verd.cls==='green'?'badge-green':verd.cls==='orange'?'badge-orange':'badge-red';
    const date=d.datum||d.updated?.slice(0,10)||'';
    const photoCount=d.photos&&d.photos.length?` · ${d.photos.length} foto${d.photos.length>1?'s':''}`:'';
    const adres=d.straat?`${d.straat} ${d.huisnummer}, ${d.gemeente}`:(d.adres||'Geen adres');
    return`<div class="dossier-card" onclick="openModal('${d.id}')">
      <div>
        <div class="dossier-addr">${adres}<span class="badge ${cls}">${verd.short}</span></div>
        <div class="dossier-meta">${d.schattingnummer?d.schattingnummer+' · ':''}${d.typepand||d.aard||'—'} · ${date}${photoCount}</div>
      </div>
      <div class="dossier-arrow">›</div>
    </div>`;
  }).join('');
}

function openModal(id){
  selectedDossierId=id;const arr=getDossiers();const d=arr.find(x=>x.id===id);
  const adres=d?.straat?`${d.straat} ${d.huisnummer}, ${d.gemeente}`:(d?.adres||'Dossier');
  document.getElementById('modal-dossier-title').textContent=adres;
  document.getElementById('modal-dossier').classList.add('open');
}
function closeModal(){document.getElementById('modal-dossier').classList.remove('open');}
function openDossierEdit(){closeModal();openDossierById(selectedDossierId);}
function openDossierRapport(){closeModal();const arr=getDossiers();const d=arr.find(x=>x.id===selectedDossierId);if(d){formData=Object.assign(emptyData(),d);showRapport();}}
function deleteDossier(){if(!confirm('Dossier verwijderen?'))return;closeModal();saveDossiers(getDossiers().filter(x=>x.id!==selectedDossierId));renderDossierList();}
document.getElementById('modal-dossier').addEventListener('click',function(e){if(e.target===this)closeModal();});

function renderStep(){
  document.getElementById('topbar-sub').textContent=`Stap ${currentStep+1}/8 – ${stepTitles[currentStep]}`;
  for(let i=0;i<STEPS;i++){const s=document.getElementById('seg'+i);if(s)s.className='prog-seg'+(i<currentStep?' done':i===currentStep?' active':'');}
  document.getElementById('btn-back').textContent=currentStep===0?'← Dossiers':'← Terug';
  document.getElementById('btn-next').textContent=currentStep===STEPS-1?'Rapport genereren →':'Volgende →';
  const c=document.getElementById('form-content');c.innerHTML='';
  const renders=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6,renderStep7];
  c.innerHTML=renders[currentStep]();
  fillStep();
  if(currentStep===7)renderPhotoGrid('photo-grid-main',formData.photos,'photos');
  window.scrollTo(0,0);
}

function addRuimte(){
  if(!formData.ruimtes)formData.ruimtes=[];
  formData.ruimtes.push({naam:'Living',verdiep:'Gelijkvloers',opp:'',opp_bron:'',vloer:[],toestand:'',comment:'',photos:[]});
  renderRuimtesContainer();
}
function deleteRuimte(i){formData.ruimtes.splice(i,1);renderRuimtesContainer();}
function updateRuimteNaam(i,val){
  formData.ruimtes[i].naam=val;
  const card=document.getElementById('ruimte-card-'+i);
  if(card){card.querySelector('.ruimte-title').textContent=val+' '+(i+1);}
  renderRuimtesContainer();
}
function updateRuimte(i,key,val){if(formData.ruimtes[i])formData.ruimtes[i][key]=val;}
function updateRuimteVloer(i,val,checked){
  if(!formData.ruimtes[i].vloer)formData.ruimtes[i].vloer=[];
  if(checked){if(!formData.ruimtes[i].vloer.includes(val))formData.ruimtes[i].vloer.push(val);}
  else{formData.ruimtes[i].vloer=formData.ruimtes[i].vloer.filter(v=>v!==val);}
}
function setTsDirect(el){el.closest('.toestand-group').querySelectorAll('.ts').forEach(t=>t.className='ts');el.classList.add('sel-'+el.dataset.val);}

function renderRuimtesContainer(){
  const c=document.getElementById('ruimtes-container');
  if(!c)return;
  if(!formData.ruimtes)formData.ruimtes=[];
  c.innerHTML=formData.ruimtes.map((r,i)=>renderRuimteCard(r,i)).join('');
  formData.ruimtes.forEach((r,i)=>{
    if(!r.photos)r.photos=[];
    renderPhotoGrid('photo-grid-ruimte-'+i,r.photos,'ruimtes.'+i+'.photos');
  });
}

function addTerras(){
  if(!formData.terrassen)formData.terrassen=[];
  formData.terrassen.push({orientatie:'',opp:'',verdiep:'Gelijkvloers',toestand:'',comment:''});

function renderPhotoGrid(gridId,photos,path){
  const grid=document.getElementById(gridId);
  if(!grid)return;
  if(!photos)photos=[];
  grid.innerHTML=photos.map((p,i)=>`
    <div class="photo-thumb">
      <img src="${p.data}" alt="${p.label||'foto'}">
      <button class="del-photo" onclick="deletePhoto('${path}',${i},'${gridId}')">✕</button>
      <input class="photo-label-input" type="text" placeholder="Label" value="${p.label||''}" oninput="updatePhotoLabel('${path}',${i},this.value)">
    </div>`).join('');
}

function getPhotoArray(path){
  const parts=path.split('.');
  if(parts.length===1)return formData[parts[0]];
  if(parts.length===3)return formData[parts[0]][parseInt(parts[1])][parts[2]];
  return[];
}
function setPhotoArray(path,arr){
  const parts=path.split('.');
  if(parts.length===1)formData[parts[0]]=arr;
  else if(parts.length===3)formData[parts[0]][parseInt(parts[1])][parts[2]]=arr;
}

function handlePhotoUpload(input,path,gridId){
  const files=Array.from(input.files);
  let arr=getPhotoArray(path)||[];
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200;let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        arr.push({data:canvas.toDataURL('image/jpeg',.82),label:''});
        loaded++;
        if(loaded===files.length){setPhotoArray(path,arr);saveCurrentDossier();renderPhotoGrid(gridId,arr,path);}
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
  input.value='';
}
function deletePhoto(path,i,gridId){
  let arr=getPhotoArray(path)||[];arr.splice(i,1);
  setPhotoArray(path,arr);saveCurrentDossier();renderPhotoGrid(gridId,arr,path);
}
function updatePhotoLabel(path,i,val){
  let arr=getPhotoArray(path)||[];if(arr[i])arr[i].label=val;
  setPhotoArray(path,arr);saveCurrentDossier();
}

// ── VALUATION ──
function calcVerdict(d){
  const vraag=parseFloat(d.vraagprijs)||0;
  const bewoon=parseFloat(d.bewoonbaar)||0;
  const ppm2=parseFloat(d.gem_ppm2)||0;
  const gemV=parseFloat(d.gem_verkoop)||0;
  const kdring=parseFloat(d.kost_dringend)||0;
  const kmlt=parseFloat(d.kost_mlt)||0;
  const kreno=parseFloat(d.kost_reno)||0;
  const scores=[];
  if(d.ruimtes)d.ruimtes.forEach(r=>{if(r.toestand&&tsMap[r.toestand])scores.push(tsMap[r.toestand]);});
  let cond=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:3;
  if(d.dakmat_asbest)cond=Math.max(1,cond-.5);
  const markt=ppm2&&bewoon?ppm2*bewoon:gemV||vraag;
  const factor=0.80+(cond/5)*.40;
  const geschat=Math.round(markt*factor);
  const totaal=vraag+kdring+kmlt+kreno;
  const marge=geschat>0?((geschat-totaal)/geschat*100):0;
  let short,cls;
  if(marge>8&&cond>=3){short='OK';cls='green';}
  else if(marge>0||cond>=2.5){short='~';cls='orange';}
  else{short='!';cls='red';}
  return{geschat,totaal,marge,cond,markt,short,cls};
}

  <div class="metric-box accent"><div class="metric-lbl">Vraagprijs</div><div class="metric-val">€${(parseFloat(d.vraagprijs)||0).toLocaleString('nl-BE')}</div></div>

  <div class="metric-box"><div class="metric-lbl">Vraagprijs/m²</div><div class="metric-val">€${ppm2Vraag.toLocaleString('nl-BE')}</div></div>
  <div class="metric-box"><div class="metric-lbl">Markt gem./m²</div><div class="metric-val">€${(parseFloat(d.gem_ppm2)||0).toLocaleString('nl-BE')}</div></div>
  <div class="metric-box"><div class="metric-lbl">Totale kost</div><div class="metric-val">€${v.totaal.toLocaleString('nl-BE')}</div></div>
  <div class="metric-box"><div class="metric-lbl">Gem. huurprijs</div><div class="metric-val">€${(parseFloat(d.gem_huur)||0).toLocaleString('nl-BE')}/mnd</div></div>
</div>
<div class="r-section"><div class="r-section-title">Identificatie & perceel</div>
  <div class="r-row"><span class="r-key">Schattingnummer</span><span class="r-val">${d.schattingnummer||'—'}</span></div>
  <div class="r-row"><span class="r-key">Adres</span><span class="r-val">${adres}</span></div>
  <div class="r-row"><span class="r-key">Grondoppervlakte</span><span class="r-val">${d.grond||'—'} m²</span></div>
  <div class="r-row"><span class="r-key">Oriëntatie / RO</span><span class="r-val">${d.orientatie||'—'} · ${d.ro||'—'}</span></div>
  <div class="r-row"><span class="r-key">Overstromingsgebied</span><span class="r-val">${d.overstr||'—'} · P:${d.pscore||'—'} G:${d.gscore||'—'}</span></div>
</div>
<div class="r-section"><div class="r-section-title">Gebouw</div>
  <div class="r-row"><span class="r-key">Type</span><span class="r-val">${d.aard||'—'}${d.aard_subtype?' – '+d.aard_subtype:''}</span></div>
  <div class="r-row"><span class="r-key">Bewoonbaar</span><span class="r-val">${d.bewoonbaar||'—'} m²</span></div>
  <div class="r-row"><span class="r-key">Bouwjaar</span><span class="r-val">${d.bouwjaar||'—'}</span></div>
  <div class="r-row"><span class="r-key">EPC</span><span class="r-val">${d.epc_klasse||'—'}${d.epc_waarde?' · '+d.epc_waarde+' kWh/m²/jaar':''}</span></div>
  <div class="r-row"><span class="r-key">Verwarming</span><span class="r-val">${verw}</span></div>
</div>
<div class="r-section"><div class="r-section-title">Indeling</div>
  <div class="r-row"><span class="r-key">Slaapkamers</span><span class="r-val">${d.globaal_sk||'—'}</span></div>
  <div class="r-row"><span class="r-key">Badkamers</span><span class="r-val">${d.globaal_bdk||'—'}</span></div>
  <div class="r-row"><span class="r-key">WC (in bdk / buiten)</span><span class="r-val">${d.globaal_wc_in||'—'} / ${d.globaal_wc_buiten||'—'}</span></div>
  ${d.ruimtes&&d.ruimtes.length?`<div class="r-row"><span class="r-key">Ruimtes</span><span class="r-val">${d.ruimtes.map(r=>`${r.naam}${r.opp?' ('+r.opp+'m²)':''} – ${r.toestand||'—'}`).join(', ')}</span></div>`:''}
</div>
<div class="r-section"><div class="r-section-title">Renovatiekosten</div>
  <div class="r-row"><span class="r-key">Dringend</span><span class="r-val">€${(parseFloat(d.kost_dringend)||0).toLocaleString('nl-BE')}</span></div>
  <div class="r-row"><span class="r-key">Middellange termijn</span><span class="r-val">€${(parseFloat(d.kost_mlt)||0).toLocaleString('nl-BE')}</span></div>
  <div class="r-row"><span class="r-key">Totale renovatie</span><span class="r-val">€${(parseFloat(d.kost_reno)||0).toLocaleString('nl-BE')}</span></div>
  <div class="r-row" style="font-weight:600;"><span class="r-key">Totaal alle werken</span><span class="r-val">€${((parseFloat(d.kost_dringend)||0)+(parseFloat(d.kost_mlt)||0)+(parseFloat(d.kost_reno)||0)).toLocaleString('nl-BE')}</span></div>
</div>
${allPhotos.length?`<div class="r-section"><div class="r-section-title">Foto's (${allPhotos.length})</div><div class="photo-grid">${allPhotos.map(p=>`<div class="photo-thumb"><img src="${p.data}" alt="${p.label||''}"><div style="padding:4px 6px;font-size:11px;color:var(--text-muted);">${p.label||''}</div></div>`).join('')}</div></div>`:''}
  `;
  showScreen('rapport');
  document.getElementById('topbar-sub').textContent=adres;
  window.scrollTo(0,0);
}

// ── CSV ──
function exportCSV(){
  const arr=getDossiers();
  if(!arr.length){alert('Geen dossiers.');return;}
  const keys=['schattingnummer','datum','naam','tel','straat','huisnummer','postcode','gemeente','grond','bewoonbaar','bouwjaar','typepand','aard','vraagprijs','gem_verkoop','gem_ppm2','gem_huur','epc_klasse','epc_waarde','kost_dringend','kost_mlt','kost_reno','ro','overstr','pscore','gscore'];
  const csv=[keys.join(';'),...arr.map(d=>keys.map(k=>{const v=d[k];if(typeof v==='boolean')return v?'Ja':'Neen';if(typeof v==='string'&&v.includes(';'))return'"'+v+'"';return v??'';}).join(';'))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='schattingen.csv';a.click();URL.revokeObjectURL(url);
}

renderDossierList();
</script>

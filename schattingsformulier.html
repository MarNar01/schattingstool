<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schattingsformulier</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f4f2ee;--surface:#fff;--border:#d8d4cc;--border-strong:#b0aa9e;--text:#1a1916;--text-muted:#6b6760;--text-hint:#9e9a94;--accent:#1a4f8a;--accent-light:#e8f0f8;--green:#1a6b3c;--green-light:#e6f4ec;--orange:#c25a00;--orange-light:#fdf0e6;--red:#b01e1e;--red-light:#fbeaea;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;min-height:100vh;}
.topbar{background:var(--text);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:.02em;}
.topbar-sub{font-size:12px;color:#aaa;font-family:'IBM Plex Mono',monospace;}
.topbar-right{display:flex;gap:8px;}
.icon-btn{background:rgba(255,255,255,.1);border:none;border-radius:var(--radius-sm);color:#fff;padding:7px 12px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;}
.screen{display:none;}.screen.active{display:block;}
.list-wrap{padding:20px;max-width:780px;margin:0 auto;}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.list-header h2{font-size:20px;font-weight:600;}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:12px 20px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:11px 18px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #e8c0c0;border-radius:var(--radius);padding:11px 18px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;}
.btn-add{background:var(--accent-light);color:var(--accent);border:1.5px dashed var(--accent);border-radius:var(--radius);padding:12px 20px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;width:100%;margin-top:10px;}
.dossier-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);cursor:pointer;}
.dossier-addr{font-size:15px;font-weight:600;}
.dossier-meta{font-size:13px;color:var(--text-muted);margin-top:2px;}
.dossier-arrow{color:var(--text-hint);font-size:20px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-orange{background:var(--orange-light);color:var(--orange);}
.badge-red{background:var(--red-light);color:var(--red);}
.form-wrap{padding:16px 20px 100px;max-width:780px;margin:0 auto;}
.progress-bar{display:flex;gap:3px;margin-bottom:20px;}
.prog-seg{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .2s;}
.prog-seg.done{background:var(--green);}
.prog-seg.active{background:var(--accent);}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:14px;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
input[type=text],input[type=number],select,textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);appearance:none;-webkit-appearance:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
textarea{height:72px;resize:vertical;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.tile-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.tile-group input{display:none;}
.tile-group label{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:15px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .15s;user-select:none;}
.tile-group input:checked+label{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
/* TOESTAND - duidelijke kleuren */
.toestand-group{display:flex;gap:6px;margin-top:4px;}
.ts{flex:1;border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 6px;font-size:14px;font-weight:700;text-align:center;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .2s;user-select:none;}
.ts:active{transform:scale(.97);}
.ts.sel-nieuw{border-color:var(--green);background:var(--green);color:#fff;}
.ts.sel-zg{border-color:#1a7a50;background:#1a7a50;color:#fff;}
.ts.sel-goed{border-color:#4a7a2a;background:#4a7a2a;color:#fff;}
.ts.sel-matig{border-color:var(--orange);background:var(--orange);color:#fff;}
.ts.sel-slecht{border-color:var(--red);background:var(--red);color:#fff;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;z-index:100;}
.bottom-nav button{flex:1;padding:14px;font-size:15px;font-weight:600;border-radius:var(--radius);cursor:pointer;font-family:inherit;border:none;}
.btn-next{background:var(--accent);color:#fff;}
.btn-back{background:var(--bg);color:var(--text);border:1px solid var(--border)!important;}
/* RUIMTE CARDS */
.ruimte-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.ruimte-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ruimte-title{font-size:15px;font-weight:600;color:var(--accent);}
.ruimte-del{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:4px;}
/* METING */
.meting-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;}
.meting-input{width:70px!important;padding:8px 10px!important;font-size:15px!important;text-align:center;}
.meting-label-input{flex:1;padding:8px 10px!important;font-size:14px!important;}
.meting-result{font-size:13px;font-weight:600;color:var(--accent);min-width:60px;text-align:right;}
.meting-del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px;}
.meting-totaal{background:var(--accent-light);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;font-weight:600;color:var(--accent);margin-top:4px;text-align:right;}
/* RENOVATIE PRIORITEIT */
.prio-group{display:flex;gap:6px;margin-top:4px;}
.prio-btn{flex:1;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;background:var(--bg);color:var(--text-muted);transition:all .2s;user-select:none;}
.prio-btn.sel-dringend{border-color:var(--red);background:var(--red);color:#fff;}
.prio-btn.sel-mlt{border-color:var(--orange);background:var(--orange);color:#fff;}
.prio-btn.sel-kan-wachten{border-color:var(--green);background:var(--green);color:#fff;}
/* KAARTEN GRID */
.kaart-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.kaart-slot{border:2px dashed var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);}
.kaart-slot.has-img{border-style:solid;border-color:var(--border);}
.kaart-slot img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.kaart-slot-label{font-size:12px;font-weight:600;color:var(--text-muted);padding:8px 10px;background:var(--surface);display:flex;justify-content:space-between;align-items:center;}
.kaart-slot-empty{aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text-hint);font-size:13px;gap:6px;}
.kaart-icon{font-size:28px;}
/* FOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.photo-thumb{position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);border:1.5px solid var(--border);}
.photo-thumb img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.photo-thumb .del-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-label-input{width:100%;border:none;border-top:1px solid var(--border);padding:4px 6px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);}
input[type=file].hidden-file{display:none;}
/* RAPPORT */
.rapport-wrap{padding:16px 20px 100px;max-width:780px;margin:0 auto;}
.r-header{background:var(--text);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.r-header-addr{font-size:18px;font-weight:600;}
.r-header-meta{font-size:13px;color:#aaa;margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.metric-box.accent{background:var(--accent);border-color:var(--accent);}
.metric-box.green{background:var(--green-light);border-color:#a8d8bc;}
.metric-box.red{background:var(--red-light);border-color:#e8c0c0;}
.metric-box.orange{background:var(--orange-light);border-color:#f0c898;}
.metric-lbl{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:3px;}
.metric-box.accent .metric-lbl,.metric-box.green .metric-lbl{color:rgba(0,0,0,.5);}
.metric-val{font-size:22px;font-weight:600;color:var(--text);font-family:'IBM Plex Mono',monospace;}
.metric-box.accent .metric-val{color:#fff;}
.metric-box.green .metric-val{color:var(--green);}
.metric-box.red .metric-val{color:var(--red);}
.metric-box.orange .metric-val{color:var(--orange);}
.r-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.r-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px;}
.r-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--bg);font-size:14px;gap:12px;}
.r-row:last-child{border-bottom:none;}
.r-key{color:var(--text-muted);flex-shrink:0;}
.r-val{font-weight:500;text-align:right;color:var(--text);}
.flags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.flag{font-size:13px;font-weight:500;padding:5px 10px;border-radius:20px;}
.flag-ok{background:var(--green-light);color:var(--green);}
.flag-warn{background:var(--orange-light);color:var(--orange);}
.flag-bad{background:var(--red-light);color:var(--red);}
.verdict-box{border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.verdict-box.green{background:var(--green-light);border:1px solid #a8d8bc;}
.verdict-box.orange{background:var(--orange-light);border:1px solid #f0c898;}
.verdict-box.red{background:var(--red-light);border:1px solid #e8c0c0;}
.verdict-title{font-size:17px;font-weight:700;margin-bottom:4px;}
.verdict-box.green .verdict-title{color:var(--green);}
.verdict-box.orange .verdict-title{color:var(--orange);}
.verdict-box.red .verdict-title{color:var(--red);}
.ruimte-rapport{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.ruimte-rapport-title{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.kaarten-rapport{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.kaart-rapport-item img{width:100%;border-radius:var(--radius-sm);}
.kaart-rapport-item p{font-size:11px;color:var(--text-muted);margin-top:3px;text-align:center;}
/* RENO BADGE */
.reno-dringend{background:var(--red-light);color:var(--red);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.reno-mlt{background:var(--orange-light);color:var(--orange);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.reno-kan{background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 36px;width:100%;max-width:600px;}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px;}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.readonly-field{background:#f0ede8!important;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--accent)!important;}
@media print{
  .topbar,.bottom-nav,.no-print{display:none!important;}
  body{background:#fff;font-size:12px;}
  .screen{display:block!important;}
  #screen-list,#screen-form{display:none!important;}
  .rapport-wrap{padding:0;}
  .r-section,.metric-box,.r-header,.verdict-box{break-inside:avoid;}
  .photo-thumb .del-photo,.kaart-slot-label button{display:none!important;}
  .kaarten-rapport{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>
<div class="topbar">
  <div><div class="topbar-title">Schattingsformulier</div><div class="topbar-sub" id="topbar-sub">Dossiers</div></div>
  <div class="topbar-right">
    <button class="icon-btn no-print" onclick="exportCSV()" id="btn-export" style="display:none">↓ CSV</button>
    <button class="icon-btn no-print" onclick="showDossiers()">☰ Dossiers</button>
  </div>
</div>

<div class="screen active" id="screen-list">
  <div class="list-wrap">
    <div class="list-header"><h2>Dossiers</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-secondary" onclick="exportCSV()">↓ CSV</button>
        <button class="btn-primary" onclick="nieuwDossier()">+ Nieuw</button>
      </div>
    </div>
    <div id="dossier-list"></div>
  </div>
</div>

<div class="screen" id="screen-form">
  <div class="form-wrap">
    <div class="progress-bar" id="progress-bar"></div>
    <div id="form-content"></div>
  </div>
  <div class="bottom-nav no-print">
    <button class="btn-back" id="btn-back" onclick="stepBack()">← Terug</button>
    <button class="btn-next" id="btn-next" onclick="stepNext()">Volgende →</button>
  </div>
</div>

<div class="screen" id="screen-rapport">
  <div class="rapport-wrap" id="rapport-content"></div>
  <div class="bottom-nav no-print">
    <button class="btn-back" onclick="showDossiers()">← Dossiers</button>
    <button class="btn-next" onclick="window.print()">🖨 Afdrukken / PDF</button>
  </div>
</div>

<div class="modal-overlay" id="modal-dossier">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Dossier</div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="openDossierEdit()">✏️ Bewerken</button>
      <button class="btn-secondary" onclick="openDossierRapport()">📄 Rapport</button>
      <button class="btn-danger" onclick="deleteDossier()">🗑 Verwijderen</button>
      <button class="btn-secondary" onclick="closeModal()">Annuleren</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const STEPS=9;
const STEP_TITLES=['Pre-visit & identificatie','Algemene informatie','Constructie & dak','Interieur','Energie & technieken','Woonplaatsen','Renovatie','Tuin & extra',"Foto's"];
const WINDRICHTINGEN=['N','NO','O','ZO','Z','ZW','W','NW'];
const RUIMTELIJKE_ORDENING=['Woongebied','Woonuitbreidingszone','Woongebied met landelijk karakter','Agrarisch gebied','Industriegebied','Recreatiegebied','Waterwegen','Bufferzone','Militair gebied','Havengebied'];
const AARD_GOED=['Huis','Appartement of studio','Industrieel vastgoed','Kantoor','Handelspand','Kamer of studentenkot','Bouwgrond','Garage','Iets anders','Investeringspand'];
const SUBTYPE_APP=['Appartement','Penthouse','Studio','Loft','Service flat'];
const EPC_KLASSEN=['A++','A+','A','B','C','D','E','F','G'];
const ISO_TYPES=['Minerale wol (glaswol/steenwol)','PUR/PIR platen','Cellulosevlokken','Houtvezel','EPS (piepschuim)','XPS','Andere'];
const VLOER_OPTIES=['Parket','Laminaat','Tegels','Beton','Tapijt','Natuursteen','Marmer','Andere'];
const VERDIEP_OPTIES=['Gelijkvloers','1e verdiep','2e verdiep','3e verdiep','4e verdiep','5e verdiep+'];
const BRON_OPP=['Gemeten ter plaatse','Uit bouwplan','Geschat','Onbekend'];
const ERFGOED_TYPES=['Beschermd monument','Beschermd stads- of dorpsgezicht','Beschermd cultuurhistorisch landschap','Vastgesteld bouwkundig erfgoed','Ankerplaats','Werelderfgoed'];
const RUIMTE_TYPES=['Living','Eetkamer','Keuken','Slaapkamer','Badkamer','WC','Bureau','Hobbyruimte','Wasplaats','Berging','Kelder','Zolder','Garage','Andere'];
const KAART_SLOTS=[
  {key:'kaart_maps',label:'📍 Google Maps',icon:'📍'},
  {key:'kaart_earth',label:'🛰️ Google Earth / luchtfoto',icon:'🛰️'},
  {key:'kaart_kadaster',label:'🗺️ Kadasterkaart',icon:'🗺️'},
  {key:'kaart_ro',label:'🏘️ Ruimtelijke ordening',icon:'🏘️'},
  {key:'kaart_overstr',label:'🌊 Overstromingskaart',icon:'🌊'},
  {key:'kaart_street',label:'🏠 Street View',icon:'🏠'},
];

let currentStep=0;
let selectedDossierId=null;
let formData=emptyData();
const tsMap={nieuw:5,zg:4,goed:3,matig:2,slecht:1};

function emptyData(){
  return{
    id:Date.now().toString(),created:new Date().toISOString(),updated:new Date().toISOString(),
    schattingnummer:'',datum:'',naam:'',tel:'',
    straat:'',huisnummer:'',postcode:'',gemeente:'',
    grond:'',breedte_perc:'',diepte_perc:'',tuin_opp:'',orientatie:'',
    ro:'',overstr:'Niet in overstromingsgebied',pscore:'',gscore:'',
    bewoonbaar:'',bouwgebied:'',bouwjaar:'',bouwjaar_bron:'',gevel_b:'',gebouw_d:'',gebouw_h:'',
    verdiep:'',bebouwing:'Open',typepand:'Huis',
    gem_verkoop:'',gem_huur:'',gem_ppm2:'',mobiliteit:'',vraagprijs:'',
    kaart_maps:'',kaart_earth:'',kaart_kadaster:'',kaart_ro:'',kaart_overstr:'',kaart_street:'',
    aard:'',aard_subtype:'',
    app_verdieping:'',app_type:'Enkel',app_verdiepingen_gebouw:'',app_welke_verdiep:'',
    app_lift:false,terrassen:[],
    ki:'',overtred:'Neen',overtred_comment:'',eigenaar_verd:'',eigenaar_comment:'',
    vkr:'Neen',erfd:'Neen',erfgoed:'Neen',erfgoed_type:'',
    con_trad:false,con_gelijmd:false,con_prefab:false,con_houtskelet:false,con_houtmassief:false,con_staal:false,con_andere:'',
    tv_hout:false,tv_beton:false,tv_metselwerk:false,tv_andere:'',
    gev_trad:false,gev_prefab:false,gev_baksteen:false,gev_beton:false,gev_pleister:false,gev_hout:false,gev_natuur:false,gev_metaal:false,gev_silex:false,gev_leien:false,gev_trespa:false,gev_andere:'',

// ── STORAGE ──
function getDossiers(){try{return JSON.parse(localStorage.getItem('schatt_v2')||'[]');}catch(e){return[];}}
function saveDossiers(arr){localStorage.setItem('schatt_v2',JSON.stringify(arr));}
function saveCurrentDossier(){
  formData.updated=new Date().toISOString();
  const arr=getDossiers();const idx=arr.findIndex(d=>d.id===formData.id);
  if(idx>=0)arr[idx]=formData;else arr.unshift(formData);
  saveDossiers(arr);
}
function generateNr(){
  const now=new Date();
  const prefix=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const arr=getDossiers().filter(x=>x.schattingnummer&&x.schattingnummer.startsWith(prefix));
  return`${prefix}-${String(arr.length+1).padStart(3,'0')}`;
}

// ── NAV ──
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');document.getElementById('btn-export').style.display=n==='list'?'flex':'none';}
function showDossiers(){showScreen('list');document.getElementById('topbar-sub').textContent='Dossiers';renderDossierList();}
function nieuwDossier(){formData=emptyData();formData.schattingnummer=generateNr();currentStep=0;showScreen('form');renderStep();}
function openDossierById(id){const d=getDossiers().find(x=>x.id===id);if(!d)return;formData=Object.assign(emptyData(),d);['ruimtes','terrassen','photos','renovaties_historiek'].forEach(k=>{if(!formData[k])formData[k]=[];});formData.ruimtes.forEach(r=>{if(!r.photos)r.photos=[];if(!r.metingen)r.metingen=[];if(!r.renovatie)r.renovatie={nodig:false,prioriteit:'',omschrijving:'',kost:''};});currentStep=0;showScreen('form');renderStep();}
function stepNext(){collectStep();saveCurrentDossier();if(currentStep<STEPS-1){currentStep++;renderStep();}else{showRapport();}}
function stepBack(){collectStep();if(currentStep>0){currentStep--;renderStep();}else showDossiers();}

// ── DOSSIER LIST ──
function renderDossierList(){
  const arr=getDossiers();const el=document.getElementById('dossier-list');
  if(!arr.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🏠</div><p>Nog geen dossiers.<br>Tik op "+ Nieuw" om te starten.</p></div>';return;}
  el.innerHTML=arr.map(d=>{
    const v=calcVerdict(d);
    const cls=v.cls==='green'?'badge-green':v.cls==='orange'?'badge-orange':'badge-red';
    const adres=d.straat?`${d.straat} ${d.huisnummer}, ${d.gemeente}`:'Geen adres';
    const pc=d.photos&&d.photos.length?` · ${d.photos.length}📷`:'';
    return`<div class="dossier-card" onclick="openModal('${d.id}')">
      <div><div class="dossier-addr">${adres}<span class="badge ${cls}">${v.short}</span></div>
      <div class="dossier-meta">${d.schattingnummer||'—'} · ${d.aard||d.typepand||'—'} · ${d.datum||d.updated?.slice(0,10)||''}${pc}</div></div>
      <div class="dossier-arrow">›</div></div>`;
  }).join('');
}

function openModal(id){selectedDossierId=id;const d=getDossiers().find(x=>x.id===id);document.getElementById('modal-title').textContent=d?.straat?`${d.straat} ${d.huisnummer}`:'Dossier';document.getElementById('modal-dossier').classList.add('open');}
function closeModal(){document.getElementById('modal-dossier').classList.remove('open');}
function openDossierEdit(){closeModal();openDossierById(selectedDossierId);}
function openDossierRapport(){closeModal();const d=getDossiers().find(x=>x.id===selectedDossierId);if(d){formData=Object.assign(emptyData(),d);showRapport();}}
function deleteDossier(){if(!confirm('Verwijderen?'))return;closeModal();saveDossiers(getDossiers().filter(x=>x.id!==selectedDossierId));renderDossierList();}
document.getElementById('modal-dossier').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── RENDER STEP ──
function renderStep(){
  document.getElementById('topbar-sub').textContent=`Stap ${currentStep+1}/${STEPS} – ${STEP_TITLES[currentStep]}`;
  const pb=document.getElementById('progress-bar');
  pb.innerHTML=Array.from({length:STEPS},(_,i)=>`<div class="prog-seg${i<currentStep?' done':i===currentStep?' active':''}"></div>`).join('');
  document.getElementById('btn-back').textContent=currentStep===0?'← Dossiers':'← Terug';
  document.getElementById('btn-next').textContent=currentStep===STEPS-1?'Rapport →':'Volgende →';
  const c=document.getElementById('form-content');
  c.innerHTML=[s0,s1,s2,s3,s4,s5,s6,s7,s8][currentStep]();
  fillStep();
  if(currentStep===5){renderRuimtesContainer();}
  if(currentStep===6){renderHistoriekContainer();}
  if(currentStep===8){renderPhotoGrid('pg-main',formData.photos,'photos');}
  window.scrollTo(0,0);
}

function renderKaartGrid(){
  const grid=document.getElementById('kaart-grid');if(!grid)return;
  grid.innerHTML=KAART_SLOTS.map(slot=>{
    const img=formData[slot.key];
    return`<div class="kaart-slot${img?' has-img':''}" id="ks_${slot.key}">
      ${img?`<img src="${img}" alt="${slot.label}">`:
        `<div class="kaart-slot-empty" onclick="document.getElementById('ki_${slot.key}').click()">
          <div class="kaart-icon">${slot.icon}</div>
          <span>Tik om toe te voegen</span>
        </div>`}
      <div class="kaart-slot-label">
        <span>${slot.label}</span>
        ${img?`<button onclick="deleteKaart('${slot.key}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;">✕</button>`:
          `<button onclick="document.getElementById('ki_${slot.key}').click()" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;">+ Upload</button>`}
      </div>
      <input type="file" accept="image/*" class="hidden-file" id="ki_${slot.key}" onchange="handleKaartUpload('${slot.key}',this)">
    </div>`;
  }).join('');
}

function handleKaartUpload(key,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      formData[key]=canvas.toDataURL('image/jpeg',.85);
      saveCurrentDossier();renderKaartGrid();
    };img.src=e.target.result;
  };reader.readAsDataURL(file);input.value='';
}
function deleteKaart(key){formData[key]='';saveCurrentDossier();renderKaartGrid();}

// Metingen
function addMeting(i){if(!formData.ruimtes[i].metingen)formData.ruimtes[i].metingen=[];formData.ruimtes[i].metingen.push({l:'',b:'',label:''});renderRuimtesContainer();}
function deleteMeting(ri,mi){formData.ruimtes[ri].metingen.splice(mi,1);renderRuimtesContainer();}
function updateMeting(ri,mi,k,v){formData.ruimtes[ri].metingen[mi][k]=v;calcTotaalOpp(ri);}
function calcTotaalOpp(ri){
  const r=formData.ruimtes[ri];if(!r)return;
  const tot=(r.metingen||[]).reduce((s,m)=>{const l=parseFloat(m.l)||0;const b=parseFloat(m.b)||0;return s+l*b;},0);
  r.totaal_opp=tot>0?Math.round(tot*100)/100:0;
  const el=document.getElementById('totaal_opp_'+ri);
  if(el)el.textContent=tot>0?`Totaal: ${r.totaal_opp} m²`:'';
  (r.metingen||[]).forEach((m,mi)=>{
    const res=document.getElementById(`mres_${ri}_${mi}`);
    const l=parseFloat(m.l)||0;const b=parseFloat(m.b)||0;
    if(res)res.textContent=l&&b?`${Math.round(l*b*100)/100} m²`:'';
  });
  renderOppSamenvatting();
}

function renderRuimtesContainer(){
  const c=document.getElementById('ruimtes-container');if(!c)return;
  if(!formData.ruimtes)formData.ruimtes=[];
  c.innerHTML=formData.ruimtes.map((r,i)=>renderRuimteCard(r,i)).join('');
  formData.ruimtes.forEach((r,i)=>{
    if(!r.photos)r.photos=[];
    renderPhotoGrid('pg-ruimte-'+i,r.photos,'ruimtes.'+i+'.photos');
  });
  renderOppSamenvatting();
}

function renderOppSamenvatting(){
  const el=document.getElementById('opp-samenvatting');
  const tbl=document.getElementById('opp-tabel');
  if(!el||!tbl)return;
  if(!formData.ruimtes||!formData.ruimtes.length){el.style.display='none';return;}

  // Group by verdiep
  const verdiepOrder=['Gelijkvloers','1e verdiep','2e verdiep','3e verdiep','4e verdiep','5e verdiep+','Onbekend'];
  const groups={};
  formData.ruimtes.forEach(r=>{
    const verd=r.verdiep||'Onbekend';
    if(!groups[verd])groups[verd]={ruimtes:[],totaal:0};
    const opp=(r.metingen||[]).reduce((s,m)=>s+(parseFloat(m.l)||0)*(parseFloat(m.b)||0),0);
    const oppR=Math.round(opp*100)/100;
    groups[verd].ruimtes.push({naam:r.naam,opp:oppR,toestand:r.toestand});
    groups[verd].totaal=Math.round((groups[verd].totaal+opp)*100)/100;
  });

  const totaalAlles=Object.values(groups).reduce((s,g)=>s+g.totaal,0);
  const bewoonbaar=parseFloat(formData.bewoonbaar)||0;
  const diff=bewoonbaar?Math.round((totaalAlles-bewoonbaar)*100)/100:null;

  const tsKleur={nieuw:'var(--green)',zg:'#1a7a50',goed:'#4a7a2a',matig:'var(--orange)',slecht:'var(--red)'};

  const rows=verdiepOrder.filter(v=>groups[v]).map(v=>{
    const g=groups[v];
    const ruimteList=g.ruimtes.map(r=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:12px;margin:2px;">
      ${r.naam}${r.opp?` <em style="color:var(--text-muted);font-style:normal;">${r.opp}m²</em>`:''}
      ${r.toestand?`<span style="width:8px;height:8px;border-radius:50%;background:${tsKleur[r.toestand]||'var(--border)'};display:inline-block;"></span>`:''}
    </span>`).join('');
    return`<tr>
      <td style="padding:8px 10px;font-weight:600;font-size:13px;white-space:nowrap;vertical-align:top;border-bottom:1px solid var(--bg);">${v}</td>
      <td style="padding:8px 10px;font-size:13px;vertical-align:top;border-bottom:1px solid var(--bg);">${ruimteList}</td>
      <td style="padding:8px 10px;font-weight:600;font-size:13px;white-space:nowrap;text-align:right;vertical-align:top;border-bottom:1px solid var(--bg);color:var(--accent);">${g.totaal>0?g.totaal+' m²':'—'}</td>
    </tr>`;
  }).join('');

  const diffHtml=diff!==null?`<tr>
    <td colspan="2" style="padding:8px 10px;font-size:12px;color:${Math.abs(diff)>5?'var(--orange)':'var(--text-muted)'};">
      ${Math.abs(diff)>5?'⚠ ':''}Verschil met pre-visit bewoonbaar (${bewoonbaar} m²): ${diff>0?'+':''}${diff} m²
    </td>
    <td></td>
  </tr>`:'';

  tbl.innerHTML=`<table style="width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);">
    <thead><tr style="background:var(--accent);">
      <th style="padding:8px 10px;font-size:11px;font-weight:600;color:#fff;text-align:left;">Verdieping</th>
      <th style="padding:8px 10px;font-size:11px;font-weight:600;color:#fff;text-align:left;">Ruimtes</th>
      <th style="padding:8px 10px;font-size:11px;font-weight:600;color:#fff;text-align:right;">Totaal m²</th>
    </tr></thead>
    <tbody>
      ${rows}
      <tr style="background:var(--accent-light);">
        <td style="padding:10px;font-weight:700;font-size:14px;color:var(--accent);">Totaal gemeten</td>
        <td></td>
        <td style="padding:10px;font-weight:700;font-size:14px;text-align:right;color:var(--accent);">${Math.round(totaalAlles*100)/100} m²</td>
      </tr>
      ${diffHtml}
    </tbody>
  </table>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:12px;">
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;"></span>Nieuw/ZG</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#4a7a2a;display:inline-block;"></span>Goed</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--orange);display:inline-block;"></span>Matig</span>
    <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block;"></span>Slecht</span>
  </div>`;
  el.style.display='block';
}

// ── FOTOS ──
function getArr(path){const p=path.split('.');if(p.length===1)return formData[p[0]];if(p.length===3)return formData[p[0]][parseInt(p[1])][p[2]];return[];}
function setArr(path,arr){const p=path.split('.');if(p.length===1)formData[p[0]]=arr;else if(p.length===3)formData[p[0]][parseInt(p[1])][p[2]]=arr;}
function handlePhotoUpload(input,path,gridId){
  const files=Array.from(input.files);let arr=getArr(path)||[];let loaded=0;
  files.forEach(file=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const MAX=1200;let w=img.width,h=img.height;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);arr.push({data:canvas.toDataURL('image/jpeg',.82),label:''});loaded++;if(loaded===files.length){setArr(path,arr);saveCurrentDossier();renderPhotoGrid(gridId,arr,path);}};img.src=e.target.result;};reader.readAsDataURL(file);});input.value='';
}
function deletePhoto(path,i,gridId){let arr=getArr(path)||[];arr.splice(i,1);setArr(path,arr);saveCurrentDossier();renderPhotoGrid(gridId,arr,path);}

// ── VALUATION ──
function calcVerdict(d){
  const vraag=parseFloat(d.vraagprijs)||0,bewoon=parseFloat(d.bewoonbaar)||0,ppm2=parseFloat(d.gem_ppm2)||0,gemV=parseFloat(d.gem_verkoop)||0;
  const scores=[];(d.ruimtes||[]).forEach(r=>{if(r.toestand&&tsMap[r.toestand])scores.push(tsMap[r.toestand]);});
  let cond=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:3;
  if(d.dakmat_asbest)cond=Math.max(1,cond-.5);
  const totReno=(d.ruimtes||[]).reduce((s,r)=>s+(r.renovatie&&r.renovatie.nodig?(parseFloat(r.renovatie.kost)||0):0),0);
  const markt=ppm2&&bewoon?ppm2*bewoon:gemV||vraag;
  const geschat=Math.round(markt*(0.80+(cond/5)*.40));
  const totaal=vraag+totReno;
  const marge=geschat>0?((geschat-totaal)/geschat*100):0;
  let short,cls;
  if(marge>8&&cond>=3){short='OK';cls='green';}
  else if(marge>0||cond>=2.5){short='~';cls='orange';}
  else{short='!';cls='red';}
  return{geschat,totaal,marge,cond,markt,short,cls,totReno};
}

    return`<div class="ruimte-rapport">
      <div class="ruimte-rapport-title">${r.naam}${r.verdiep?' · '+r.verdiep:''}</div>
      <div style="font-size:13px;color:var(--text-muted);">
        ${tot?`Oppervlakte: ${Math.round(tot*100)/100} m²${r.opp_bron?' ('+r.opp_bron+')':''} · `:''}
        ${r.vloer&&r.vloer.length?'Vloer: '+r.vloer.join(', ')+' · ':''}
        Staat: <strong>${r.toestand||'—'}</strong>
        ${r.comment?' · '+r.comment:''}
      </div>
      ${r.renovatie&&r.renovatie.nodig?`<div style="margin-top:4px;"><span class="reno-${r.renovatie.prioriteit}">${r.renovatie.prioriteit==='dringend'?'🔴 Dringend':r.renovatie.prioriteit==='mlt'?'🟠 MLT':'🟢 Kan wachten'}</span> ${r.renovatie.omschrijving||''}${r.renovatie.kost?' – €'+parseFloat(r.renovatie.kost).toLocaleString('nl-BE'):''}</div>`:''}
      ${r.photos&&r.photos.length?`<div class="photo-grid" style="margin-top:8px;">${r.photos.map(p=>`<div class="photo-thumb"><img src="${p.data}" alt="${p.label||''}"><div style="padding:3px 6px;font-size:11px;color:var(--text-muted);">${p.label||''}</div></div>`).join('')}</div>`:''}
    </div>`;
  }).join('')}
</div>`:''}
${ruimtesMetReno.length?`<div class="r-section"><div class="r-section-title">Renovatiesamenvatting</div>
  ${ruimtesMetReno.map(r=>`<div class="r-row"><span class="r-key">${r.naam}</span><span class="r-val"><span class="reno-${r.renovatie.prioriteit}" style="margin-right:6px;">${r.renovatie.prioriteit==='dringend'?'Dringend':r.renovatie.prioriteit==='mlt'?'MLT':'Kan wachten'}</span>${r.renovatie.kost?'€'+parseFloat(r.renovatie.kost).toLocaleString('nl-BE'):''}</span></div>`).join('')}
  <div class="r-row" style="font-weight:700;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;"><span class="r-key">🔴 Dringend</span><span class="r-val">€${totD.toLocaleString('nl-BE')}</span></div>
  <div class="r-row" style="font-weight:700;"><span class="r-key">🟠 MLT</span><span class="r-val">€${totM.toLocaleString('nl-BE')}</span></div>
  <div class="r-row" style="font-weight:700;"><span class="r-key">🟢 Kan wachten</span><span class="r-val">€${totK.toLocaleString('nl-BE')}</span></div>
  <div class="r-row" style="font-weight:700;font-size:15px;"><span class="r-key">Totaal</span><span class="r-val">€${(totD+totM+totK).toLocaleString('nl-BE')}</span></div>
</div>`:''}
${d.renovaties_historiek&&d.renovaties_historiek.length?`<div class="r-section"><div class="r-section-title">Uitgevoerde renovaties</div>
  ${d.renovaties_historiek.map(h=>`<div class="r-row"><span class="r-key">${h.jaar||'—'} – ${h.type||'—'}</span><span class="r-val">${h.omschrijving||''}</span></div>`).join('')}
</div>`:''}
${allPhotos.length?`<div class="r-section"><div class="r-section-title">Foto's (${allPhotos.length})</div><div class="photo-grid">${allPhotos.map(p=>`<div class="photo-thumb"><img src="${p.data}" alt="${p.label||''}"><div style="padding:3px 6px;font-size:11px;color:var(--text-muted);">${p.label||''}</div></div>`).join('')}</div></div>`:''}
  `;
  showScreen('rapport');document.getElementById('topbar-sub').textContent=adres;window.scrollTo(0,0);
}

// ── CSV ──
function exportCSV(){
  const arr=getDossiers();if(!arr.length){alert('Geen dossiers.');return;}
  const keys=['schattingnummer','datum','naam','tel','straat','huisnummer','postcode','gemeente','grond','bewoonbaar','bouwjaar','aard','vraagprijs','gem_verkoop','gem_ppm2','gem_huur','epc_klasse','epc_geschat','ro','overstr','pscore','gscore'];
  const csv=[keys.join(';'),...arr.map(d=>keys.map(k=>{const v=d[k];if(typeof v==='boolean')return v?'Ja':'Neen';if(typeof v==='string'&&v.includes(';'))return'"'+v+'"';return v??'';}).join(';'))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='schattingen.csv';a.click();URL.revokeObjectURL(url);
}

renderDossierList();
</script>
